services:
  postgres:
    image: postgres:16-alpine
    container_name: ordermgt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ordermgt
      POSTGRES_USER: ordermgt
      POSTGRES_PASSWORD: ordermgt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ordermgt -d ordermgt"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
